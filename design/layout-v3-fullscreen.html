<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eclipse dashboard</title>
<style>
  :root{
    --screen:#ffffff; --zone:#eeedea; --line:#e3e2de; --divider:#f2f1ee;
    --ink:#20201e; --muted:#93908a;
    --accent:#e0952f; --accent-bg:#fbf1de; --accent-ink:#7a4d12;
    --live-bg:#e6f4ea; --live-ink:#1f6b34;
    --cline:#3467c8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; overflow:hidden;}
  body{background:var(--screen); color:var(--ink);
       font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;}

  /* height/width:100% (not 100vh/100vw) -- viewport units have known rounding
     quirks under browser zoom combined with OS-level DPI scaling, which can
     leave a sliver of gap or a tiny overflow at the window edge. Percentage
     sizing against the already-100%-tall html/body chain is the more robust
     pattern and isn't subject to that class of bug. */
  .app{width:100%; height:100%; display:flex; flex-direction:column;}
  .topbar{flex:0 0 34px; display:flex; align-items:center; gap:20px; padding:0 14px;
          font-size:13px; color:var(--muted); border-bottom:1px solid var(--line);}
  .topbar b{color:var(--ink); font-weight:500;}
  .topbar .fill{flex:1;}

  .main{flex:1; display:flex; min-height:0;}
  .col{display:flex; flex-direction:column; min-width:160px;}
  .col.left{flex:1 1 0;}
  .col.right{flex:1 1 0;}
  .pane{flex:1 1 0; min-height:140px; position:relative; overflow:hidden;}

  .vsplit{flex:0 0 6px; cursor:col-resize; display:flex; align-items:center; justify-content:center;
          background:var(--divider);}
  .hsplit{flex:0 0 6px; cursor:row-resize; display:flex; align-items:center; justify-content:center;
          background:var(--divider);}
  .grip{display:flex; gap:3px;}
  .vsplit .grip{flex-direction:column;}
  .grip i{width:3px; height:3px; border-radius:50%; background:var(--line);}
  .vsplit:hover .grip i, .hsplit:hover .grip i{background:var(--muted);}

  /* --- contacts table ---
     Sized off native CSS container-query units (cqw/cqh) -- these are
     PHYSICALLY zoom-invariant on their own: a panel that's a fixed
     proportion of the window stays that same proportion at any zoom,
     automatically, because the panel's own CSS-pixel size already shrinks
     with zoom in exactly the way that cancels out. (An earlier attempt
     tried to compensate this measurement with devicePixelRatio via JS --
     that was solving a problem that didn't exist here, and depended on
     JS timing that turned out to be unreliable in practice.)
     The real zoom-inconsistency risk is the FIXED PIXEL LITERALS this gets
     compared against (300px/340px below) -- those genuinely DO get
     physically bigger with zoom, unlike the cqw/cqh terms. Left as plain
     literals deliberately: the shrink-to-fit floor only matters in the
     already-extreme small-panel case, and per instruction it's fine for
     that to be imperfect at ridiculous zoom levels as long as it still
     reliably shrinks rather than ever overflowing -- which pure native
     container queries guarantee, with no dependency on any JS event
     firing correctly. Ceiling stays at 1 (never grows past plain
     14px/11px/etc, unlike the countdown panel, which should fill a large
     panel -- the table shouldn't grow past a comfortable reading size). */
  #paneContacts{container-type:size; container-name:contacts;}
  .contacts{
    --tscale: max(0.4, min(1, calc(100cqw / 300px), calc(100cqh / 340px)));
    padding: calc(14px*var(--tscale)) 14px calc(8px*var(--tscale));
  }
  table{width:100%; border-collapse:collapse; font-size:calc(14px*var(--tscale));}
  td,th{padding:calc(6px*var(--tscale)) 10px; text-align:left; border-bottom:1px solid var(--line);}
  th{color:var(--muted); font-weight:500; font-size:calc(11px*var(--tscale)); text-transform:uppercase; letter-spacing:.4px;}
  td.num{text-align:right; font-variant-numeric:tabular-nums;}
  tr.next td{background:var(--accent-bg); color:var(--accent-ink); font-weight:500;}

  /* --- local circumstances (duration, magnitude, etc.) --- */
  .circ{display:flex; gap:22px; flex-wrap:wrap; border-top:1px solid var(--line);
        padding:calc(12px*var(--tscale)) 10px calc(6px*var(--tscale));
        margin-top:calc(6px*var(--tscale));}
  .circ div{display:flex; flex-direction:column; gap:2px;}
  .circ span{font-size:calc(11px*var(--tscale)); color:var(--muted); text-transform:uppercase; letter-spacing:.4px;}
  .circ b{font-size:calc(15px*var(--tscale)); font-weight:500; font-variant-numeric:tabular-nums;}

  /* --- countdown + schematic ---
     Sized off native cqw/cqh -- and, unlike the table, deliberately with NO
     fixed-pixel ceiling anywhere in the formula. A ceiling is exactly what
     broke zoom-invariance here before: cqw/cqh terms are physically
     zoom-invariant on their own (see the note above the table), but a fixed
     "220px" ceiling is not (fixed pixels genuinely get physically bigger
     with zoom) -- so whenever the panel was big enough to hit that ceiling,
     the result silently stopped being zoom-invariant and started tracking
     zoom instead, which is exactly the "still zooms" symptom. Removing the
     ceiling entirely removes the only zoom-reactive term in the formula, so
     this is now zoom-invariant unconditionally, not just below some size.
     The floor (20px/16px) is a plain literal and in principle has the same
     issue in reverse, but it only matters in the already-extreme small-panel
     case, which is an acceptable place for imperfection. */
  #paneCountdown{container-type:size; container-name:countdown;}
  .countdown{display:flex; flex-direction:column; align-items:center; justify-content:center;
             height:100%; gap:14px; padding:10px;}
  .numwrap{display:flex; flex-direction:column; align-items:center; justify-content:center;
           gap:6px; min-width:0;}
  .numwrap .numline{font-family:"SF Mono","Cascadia Mono",Consolas,monospace;
                    font-weight:500; letter-spacing:-.5px; white-space:nowrap;
                    font-size:max(20px, min(14cqw, 20cqh));}
  .numwrap.dual .numline{font-size:max(16px, min(16cqw, 12cqh));}
  .countdown svg{width:max(50px, min(40cqw, 56cqh));
                 height:max(50px, min(40cqw, 56cqh)); flex-shrink:0;}

  /* MAX and C3 (during totality) go side by side once there's room, else stacked */
  @container countdown (min-width: 500px){
    .numwrap.dual{flex-direction:row; gap:28px;}
  }

  /* review-only control, not final UI */
  .devtoggle{position:absolute; top:10px; right:12px; z-index:2; background:none;
             border:1px dashed var(--line); color:var(--muted); font-size:11px;
             padding:3px 9px; border-radius:20px; cursor:pointer;}
  .devtoggle:hover{color:var(--ink); border-color:var(--muted);}

  /* --- map --- */
  .map{background:var(--zone); height:100%; display:flex; align-items:center; justify-content:center;}
  .map svg{width:70%; height:70%;}

  /* --- wide/allsky --- */
  .skywrap{height:100%; display:flex; flex-direction:column;}
  .tabs{flex:0 0 32px; display:flex; gap:2px; padding:8px 14px 0;}
  .tabs button{background:none; border:none; font-size:13px; color:var(--muted);
               padding:4px 8px; border-bottom:2px solid transparent; cursor:pointer;}
  .tabs button.on{color:var(--ink); border-bottom-color:var(--accent);}
  .skyzone{flex:1; background:var(--zone); margin:0 14px 14px; border-radius:6px; position:relative;}
  .fovbox{position:absolute; inset:18% 14%; border:1px dashed var(--muted); border-radius:2px;}
  .fovbox::after{content:''; position:absolute; left:50%; top:50%; width:16px; height:16px;
                 margin:-8px 0 0 -8px; border-radius:50%; border:1px solid var(--ink);}

  /* --- bottom time bar ---
     Live/Sim is deliberately the most visually forceful control on screen --
     leaving Live during the actual event by accident is the one mistake this
     UI should make hard. Pressing Sim while Live never switches immediately;
     it arms (button becomes "Confirm", amber) and needs a second press within
     a few seconds, or it quietly reverts. Live always switches back in a
     single press -- returning to truth should never have friction, only
     leaving it. Fixed min-width on both buttons so arming ("Sim" -> "Confirm",
     a longer, bolder label) never resizes the control. */
  .timebar{flex:0 0 84px; display:flex; align-items:center; gap:16px; padding:0 16px;
           border-top:1px solid var(--line); user-select:none; -webkit-user-select:none;}

  .modeswitch{display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; flex:0 0 auto;}
  .modeswitch button{background:none; border:none; padding:10px 4px; width:88px; font-weight:500; font-size:14px;
                     color:var(--muted); cursor:pointer;}
  .modeswitch button.live.on{background:var(--live-bg); color:var(--live-ink); font-weight:700;}
  .modeswitch button.live.on::before{content:'\25CF '; }
  .modeswitch button.sim.on{background:var(--ink); color:#fff;}
  .modeswitch button.sim.confirm{background:var(--accent); color:#000; font-weight:700;}

  /* toggles the arcsinh "test" curve on/off; styled to match the mode
     buttons (same family of control) rather than a small dev-only pill */
  .stretchbtn{flex:0 0 auto; background:none; border:1px solid var(--line); border-radius:8px;
             padding:10px 16px; font-weight:500; font-size:14px; color:var(--muted); cursor:pointer;}
  .stretchbtn.on{background:var(--ink); color:#fff; border-color:var(--ink);}

  /* Sim-only: real-time playback of the sim clock. Hidden entirely in Live,
     which has no pause concept -- it's always just "now". */
  .playbtn{flex:0 0 auto; width:40px; height:40px; border:1px solid var(--line); border-radius:8px;
          background:none; color:var(--ink); font-size:14px; cursor:pointer;
          display:flex; align-items:center; justify-content:center;}
  .playbtn:hover{border-color:var(--muted);}

  /* Timeline, in three vertically distinct, non-overlapping bands so the
     cursor (confined to the middle band) can never overlap a label:
       0-16px   hour labels (text)
       16-60px  axis + tick marks + C1..C4/Max lines + the cursor -- given
                more room (was 16-44px) so all of these could be made
                taller/more visible
       62-76px  C1..C4/Max text labels, all in a single row -- C2/Max/C3
                (which can sit only seconds apart on the linear curve) are
                kept side by side rather than stacked: Max stays at its true
                position, C2/C3 are pushed away from it by the same
                distance on each side (symmetric), only as far as actually
                needed to clear the overlap, and never less than their
                natural spacing -- so the stretch curve, where they're
                already well separated, is left untouched. */
  .slidertrack{flex:1; position:relative; height:100%; touch-action:none;
              user-select:none; -webkit-user-select:none;}
  .hourlabels{position:absolute; left:0; right:0; top:0; height:16px;}
  .hour-lab{position:absolute; top:0; transform:translateX(-50%); font-size:10px; font-weight:500;
           color:var(--ink); white-space:nowrap;}
  .hour-lab.min10{font-size:9px; font-weight:400; color:var(--muted);}
  .hour-lab.min1{font-size:8px; font-weight:400; color:var(--muted);}

  .axisline{position:absolute; left:0; right:0; top:38px; height:1px; background:var(--line);}
  .ticks{position:absolute; left:0; right:0; top:0; height:100%;}
  /* width:2px, not 1px -- these sit at percentage-based (often fractional
     pixel) positions, and a 1px-wide mark at a fractional offset gets
     anti-aliased across two physical pixels at partial opacity each,
     rendering faint and inconsistently thin/thick depending on the exact
     sub-pixel alignment. 2px guarantees at least one full solid pixel of
     coverage regardless of position, so every tick reads the same. */
  .tick{position:absolute; top:32px; width:2px; height:12px; background:var(--ink);}
  .tick.hour{top:28px; height:20px; background:var(--ink);}
  .tick.min1{top:35px; height:6px;}

  .totband{position:absolute; height:16px; top:30px; background:var(--accent-bg); border-radius:3px;}
  .clines{position:absolute; left:0; right:0; top:0; height:100%;}
  .cline{position:absolute; top:22px; width:2px; height:32px; background:var(--cline);}

  .clabels{position:absolute; left:0; right:0; top:62px; height:14px;}
  .clabel{position:absolute; top:0; transform:translateX(-50%); font-size:11px; font-weight:500;
         color:var(--ink); white-space:nowrap;}

  /* Custom-drawn (not a native range input) so it renders identically in
     Live and Sim -- only whether the track responds to pointer input
     differs. Confined vertically to the axis/tick band (see above), so it
     can never overlap the hour labels above or the C1..C4 labels below,
     wherever it's positioned. */
  .cursor{position:absolute; top:20px; width:2px; height:36px; background:#c22; z-index:3; pointer-events:none;}
</style>
</head>
<body>
  <div class="app">
    <div class="topbar"><b>Zaragoza</b><span>41.65°N 0.89°W</span><span class="fill"></span><span>20:28:23 CEST</span><span>18:28:23 UT</span></div>
    <div class="main" id="main">
      <div class="col left" id="colLeft">
        <div class="pane" id="paneContacts">
          <div class="contacts">
            <table>
              <thead><tr><th>Event</th><th class="num">T</th><th class="num">Time</th><th class="num">Alt</th></tr></thead>
              <tbody>
                <tr><td>C1</td><td class="num">+53:23</td><td class="num">19:35:00</td><td class="num">—</td></tr>
                <tr class="next"><td>C2</td><td class="num">−00:41.6</td><td class="num">20:29:04</td><td class="num">—</td></tr>
                <tr><td>Max</td><td class="num">−01:21</td><td class="num">20:29:44</td><td class="num">5.9°</td></tr>
                <tr><td>C3</td><td class="num">−02:05</td><td class="num">20:30:28</td><td class="num">—</td></tr>
                <tr><td>C4</td><td class="num">−53:37</td><td class="num">21:22:00</td><td class="num">—</td></tr>
                <tr><td>Sunset</td><td class="num">−51:37</td><td class="num">21:20:00</td><td class="num">0°</td></tr>
              </tbody>
            </table>
            <div class="circ">
              <div><span>Duration</span><b>1m 24s</b></div>
              <div><span>Magnitude</span><b>1.039</b></div>
              <div><span>Obscuration</span><b>100%</b></div>
              <div><span>Sun az</span><b>296°</b></div>
            </div>
          </div>
        </div>
        <div class="hsplit" id="hsplitLeft"><div class="grip"><i></i><i></i><i></i></div></div>
        <div class="pane" id="paneCountdown">
          <!-- Countdown display logic (layout designed for both; not driven by a
               real clock yet). Normally ONE line, the next upcoming event, e.g.
               "C1-53:23" before C1, "C2-00:41.6" before C2, "C4-53:37" after C3.
               Between C2 and C3 (during totality), TWO lines: "MAX-ttt" and
               "C3-ttt" -- both matter while totality is running, shown smaller
               so they still fit. The dashed toggle below is a review-only aid
               to compare both states -- not part of the final UI. -->
          <button class="devtoggle" id="devToggle">totality view</button>
          <div class="countdown">
            <div class="numwrap" id="numwrap"><div class="numline">C2−00:41.6</div></div>
            <svg viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="44" fill="none" stroke="#20201e" stroke-width="1.5"/>
              <circle cx="53" cy="61" r="45.3" fill="#20201e"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="vsplit" id="vsplit"><div class="grip"><i></i><i></i><i></i></div></div>

      <div class="col right" id="colRight">
        <div class="pane map" id="paneMap">
          <svg viewBox="0 0 200 140"><path d="M20,110 30,70 55,40 90,25 130,20 165,35 180,55" fill="none" stroke="#b9b6ae" stroke-width="2"/>
            <ellipse cx="95" cy="34" rx="16" ry="5" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
        </div>
        <div class="hsplit" id="hsplitRight"><div class="grip"><i></i><i></i><i></i></div></div>
        <div class="pane" id="paneSky">
          <div class="skywrap">
            <div class="tabs">
              <button class="on" id="tabWide">Wide</button>
              <button id="tabAll">All-sky</button>
            </div>
            <div class="skyzone" id="skyzone"><div class="fovbox" id="fovbox"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="timebar">
      <div class="modeswitch">
        <button class="live on" id="liveBtn">Live</button>
        <button class="sim" id="simBtn">Sim</button>
      </div>
      <button class="playbtn" id="playBtn" title="Play/Pause" style="visibility:hidden;">⏸</button>
      <div class="slidertrack" id="slidertrack">
        <div class="hourlabels" id="hourLabels"></div>
        <div class="axisline"></div>
        <div class="ticks" id="ticks"></div>
        <div class="totband" id="totband"></div>
        <div class="clines" id="clines"></div>
        <div class="clabels" id="clabels"></div>
        <div class="cursor" id="cursor"></div>
      </div>
      <button class="stretchbtn" id="curveToggle">Stretch</button>
    </div>
  </div>

<script>
// Panel sizes are stored as flex-grow RATIOS (basis:0), not fixed pixels or
// even percentages of the container. Fixed pixels are correct only at the
// zoom level they were dragged at -- browser zoom changes how many CSS
// pixels fit in the window, so a panel pinned to (say) "300px" stops being
// the same fraction of the window once zoom changes that count, and the
// whole grid drifts off the edges. Percentages of the container have a
// subtler version of the same problem: they'd have to also account for the
// splitter's fixed 6px, which isn't part of either percentage -- get that
// wrong and the two panels' percentages plus the splitter add up to more
// than 100%, overflowing the container. flex-grow sidesteps both problems:
// the browser reserves the splitter's fixed 6px first, then divides
// whatever's left between the two panels by ratio, automatically, at any
// container size.
function drag(handle, axis, growEl, shrinkEl, sizeProp){
  handle.addEventListener('pointerdown', e=>{
    handle.setPointerCapture(e.pointerId);
    const start = axis==='x' ? e.clientX : e.clientY;
    const g0 = growEl.getBoundingClientRect()[sizeProp];
    const s0 = shrinkEl.getBoundingClientRect()[sizeProp];
    function apply(g, s){
      growEl.style.flex = g + ' 0 0';
      shrinkEl.style.flex = s + ' 0 0';
    }
    apply(g0, s0);
    document.body.style.cursor = getComputedStyle(handle).cursor;
    function move(e){
      const pos = axis==='x' ? e.clientX : e.clientY;
      const d = pos - start;
      const min = 140;
      let g = g0 + d, s = s0 - d;
      if(g < min || s < min) return;
      apply(g, s);
    }
    function up(){ document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); document.body.style.cursor=''; }
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  });
}
drag(document.getElementById('vsplit'), 'x', document.getElementById('colLeft'), document.getElementById('colRight'), 'width');
drag(document.getElementById('hsplitLeft'), 'y', document.getElementById('paneContacts'), document.getElementById('paneCountdown'), 'height');
drag(document.getElementById('hsplitRight'), 'y', document.getElementById('paneMap'), document.getElementById('paneSky'), 'height');

document.getElementById('tabWide').onclick = ()=>{ document.getElementById('tabWide').classList.add('on'); document.getElementById('tabAll').classList.remove('on'); document.getElementById('fovbox').style.display='block'; };
document.getElementById('tabAll').onclick = ()=>{ document.getElementById('tabAll').classList.add('on'); document.getElementById('tabWide').classList.remove('on'); document.getElementById('fovbox').style.display='none'; };

const numwrap = document.getElementById('numwrap');
const devToggle = document.getElementById('devToggle');
let dualState = false;
function renderCountdown(){
  if(dualState){
    numwrap.classList.add('dual');
    numwrap.innerHTML = '<div class="numline">MAX−01:21</div><div class="numline">C3−02:05</div>';
    devToggle.textContent = 'single view';
  } else {
    numwrap.classList.remove('dual');
    numwrap.innerHTML = '<div class="numline">C2−00:41.6</div>';
    devToggle.textContent = 'totality view';
  }
}
devToggle.onclick = ()=>{ dualState = !dualState; renderCountdown(); };

// --- Time slider: two curves over the same C1..C4 timeline ---
// Times as seconds-since-midnight, matching the contact table's displayed
// wall-clock values (Zaragoza reference data used throughout this mock).
const T = { c1: 70500, c2: 73744, max: 73784, c3: 73828, c4: 76920 };
const MARGIN = 30 * 60; // comfortable margin shown before C1 / after C4
const domainStart = T.c1 - MARGIN, domainEnd = T.c4 + MARGIN;
const K = 60; // "real" curve: identity (linear). "stretch" curve: arcsinh,
              // symmetric around max by construction (asinh is an odd
              // function of (t - max)) -- near-linear within about +-K
              // seconds of max, compressing increasingly beyond that, so
              // C2/Max/C3 (a couple minutes apart) get comfortable click
              // targets without the C1..C2 / C3..C4 partial phases (each
              // most of an hour) taking over the whole track.
function realWarp(t){ return t; }
function stretchWarp(t){ return Math.asinh((t - T.max) / K); }

let stretchOn = false;
function warp(t){ return stretchOn ? stretchWarp(t) : realWarp(t); }
function unwarp(w){ return stretchOn ? T.max + Math.sinh(w) * K : w; }
function trackBounds(){ return [warp(domainStart), warp(domainEnd)]; }
function pct(t){ const [lo, hi] = trackBounds(); return (warp(t) - lo) / (hi - lo) * 100; }
function fmtHM(t){ const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60);
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0'); }
function fmtM(t){ return String(Math.floor((t % 3600) / 60)).padStart(2, '0'); }

const slidertrack = document.getElementById('slidertrack');
const hourLabelsEl = document.getElementById('hourLabels');
const ticksEl = document.getElementById('ticks');
const totband = document.getElementById('totband');
const clinesEl = document.getElementById('clines');
const clabelsEl = document.getElementById('clabels');
const cursor = document.getElementById('cursor');
const curveToggle = document.getElementById('curveToggle');
const TICK_DEFS = [
  { key: 'c1', lab: 'C1' }, { key: 'c2', lab: 'C2' }, { key: 'max', lab: 'Max' },
  { key: 'c3', lab: 'C3' }, { key: 'c4', lab: 'C4' },
];

let simTime = T.c2 - 41; // matches the "now" reference used elsewhere in this mock

// Tick MARKS: every 10-min step, in both curves, always -- these were
// already correct and unaffected by this pass. Tick LABELS (the text
// timestamps) are what's conditional: hour ticks always get one; 10-min
// ticks get one too on the linear curve (all of them), but on the stretch
// curve only within the hour bracket immediately surrounding max -- that's
// the region actually being expanded, so a label is useful there; further
// out the compression makes a 10-min-by-10-min timestamp meaningless, so
// only the (always-labeled) hour ticks orient the viewer.
function renderHourTicks(){
  hourLabelsEl.innerHTML = ''; ticksEl.innerHTML = '';
  const hourBefore = Math.floor(T.max / 3600) * 3600;
  const hourAfter = hourBefore + 3600;
  const first = Math.ceil(domainStart / 600) * 600;
  for(let t = first; t <= domainEnd; t += 600){
    const isHour = t % 3600 === 0;
    const p = pct(t);

    const tick = document.createElement('div');
    tick.className = 'tick' + (isHour ? ' hour' : '');
    tick.style.left = p + '%';
    ticksEl.appendChild(tick);

    const showLabel = isHour || !stretchOn || (t >= hourBefore && t <= hourAfter);
    if(showLabel){
      const lab = document.createElement('div');
      lab.className = 'hour-lab' + (isHour ? '' : ' min10');
      lab.style.left = p + '%'; lab.textContent = fmtHM(t);
      hourLabelsEl.appendChild(lab);
    }
  }

  // Stretch view only: 1-min ticks+labels within the two 10-min blocks
  // immediately surrounding max -- i.e. max rounded to its nearest 10-min
  // mark, +-1 block either side (e.g. max at 20:29:44 rounds to 20:30,
  // giving a 20:20-20:40 window). Minute-only labels ("23", not "20:23"),
  // since they're all inside a single displayed hour already.
  if(stretchOn){
    const maxRound10 = Math.round(T.max / 600) * 600;
    const winStart = Math.max(domainStart, maxRound10 - 600);
    const winEnd = Math.min(domainEnd, maxRound10 + 600);
    for(let t = winStart; t <= winEnd; t += 60){
      if(t % 600 === 0) continue; // already rendered above as a 10-min/hour tick
      const p = pct(t);
      const tick = document.createElement('div');
      tick.className = 'tick min1'; tick.style.left = p + '%';
      ticksEl.appendChild(tick);
      const lab = document.createElement('div');
      lab.className = 'hour-lab min1'; lab.style.left = p + '%'; lab.textContent = fmtM(t);
      hourLabelsEl.appendChild(lab);
    }

    // The curve is most expanded right at max and compresses further out,
    // so even inside this +-10min window the outermost 1-min ticks can end
    // up pixel-close to the neighboring 10-min mark's (wider) label. Drop
    // just the TEXT for any 1-min label that collides with an already-
    // placed hour/10-min label -- its tick mark stays, so the granularity
    // is still visible, just not a colliding, illegible label on top of it.
    const anchorLabels = [...hourLabelsEl.querySelectorAll('.hour-lab:not(.min1)')];
    const min1Labels = [...hourLabelsEl.querySelectorAll('.hour-lab.min1')];
    for(const m of min1Labels){
      const mr = m.getBoundingClientRect();
      const collides = anchorLabels.some(a => {
        const ar = a.getBoundingClientRect();
        return mr.left < ar.right && ar.left < mr.right;
      });
      if(collides) m.remove();
    }
  }
}

// C1..C4/Max labels: all on a single row. C1/C4 always render at their true
// position (they're never close to anything, by construction of the domain).
// C2/Max/C3 can sit only seconds apart on the linear curve, so instead of
// stacking them, Max stays anchored at its true position and C2/C3 are each
// pushed away from it by the SAME distance (symmetric), using each label's
// REAL measured width (not an estimate) to find the minimum distance that
// clears the overlap -- and never less than their natural/true spacing, so
// the stretch curve, where they're already comfortably spread, is untouched.
function renderCLines(){
  clinesEl.innerHTML = ''; clabelsEl.innerHTML = '';
  const items = TICK_DEFS.map(({ key, lab }) => ({ key, lab, p: pct(T[key]) }));

  // vertical lines always mark each contact's TRUE position
  for(const it of items){
    const line = document.createElement('div');
    line.className = 'cline'; line.style.left = it.p + '%';
    clinesEl.appendChild(line);
  }

  const byKey = {};
  for(const it of items){
    const el = document.createElement('div');
    el.className = 'clabel'; el.textContent = it.lab;
    clabelsEl.appendChild(el);
    byKey[it.key] = { el, p: it.p };
  }

  const trackW = slidertrack.getBoundingClientRect().width;
  const pxOf = key => byKey[key].p / 100 * trackW;
  const widthOf = key => byKey[key].el.getBoundingClientRect().width;
  const PAD = 6;

  const mx = pxOf('max'), wMax = widthOf('max');
  const c2px = pxOf('c2'), wC2 = widthOf('c2');
  const c3px = pxOf('c3'), wC3 = widthOf('c3');
  const neededLeft = wMax / 2 + wC2 / 2 + PAD;
  const neededRight = wMax / 2 + wC3 / 2 + PAD;
  const trueLeft = mx - c2px, trueRight = c3px - mx;
  const D = Math.max(neededLeft, neededRight, trueLeft, trueRight);

  byKey.c1.el.style.left = byKey.c1.p + '%';
  byKey.c2.el.style.left = ((mx - D) / trackW * 100) + '%';
  byKey.max.el.style.left = (mx / trackW * 100) + '%';
  byKey.c3.el.style.left = ((mx + D) / trackW * 100) + '%';
  byKey.c4.el.style.left = byKey.c4.p + '%';

  const p1 = pct(T.c2), p2 = pct(T.c3);
  totband.style.left = p1 + '%';
  totband.style.width = (p2 - p1) + '%';
}

function renderCursor(){
  cursor.style.left = pct(simTime) + '%';
}

function renderTimebar(){
  renderHourTicks();
  renderCLines();
  renderCursor();
}

curveToggle.onclick = () => {
  stretchOn = !stretchOn;
  curveToggle.classList.toggle('on', stretchOn);
  renderTimebar();
};

// Drawn identically in Live and Sim -- the track only RESPONDS to pointer
// input in Sim; the request was that nothing should look different, only
// whether the cursor is draggable.
function trackPointerToTime(clientX){
  const r = slidertrack.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
  const [lo, hi] = trackBounds();
  return unwarp(lo + frac * (hi - lo));
}
slidertrack.addEventListener('pointerdown', e => {
  if(timeMode !== 'sim') return;
  e.preventDefault(); // belt-and-suspenders alongside user-select:none above --
                       // without this, dragging across the tick/hour labels
                       // triggers native text selection instead of just scrubbing
  pauseClock(); // dragging always pauses -- see the clock block below
  slidertrack.setPointerCapture(e.pointerId);
  simTime = trackPointerToTime(e.clientX);
  renderCursor();
  function move(e){ simTime = trackPointerToTime(e.clientX); renderCursor(); }
  function up(){ document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); }
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
});

// --- Sim playback: real-time clock, pause/resume ---
// Entering sim mode starts simTime at T-90s to C2 and plays forward in real
// time (1 real second per 1 simulated second) until paused, dragged (which
// always pauses -- see the pointerdown handler above), or it reaches the end
// of the domain. Resuming continues forward from wherever it was left, not
// back to the T-90s start -- that reset only happens on FRESH entry into sim.
const playBtn = document.getElementById('playBtn');
let playing = false;
let lastTickWallClock = null;

function startClock(){
  playing = true;
  lastTickWallClock = performance.now();
  renderPlayBtn();
  requestAnimationFrame(clockTick);
}
function pauseClock(){
  if(!playing) return;
  playing = false;
  renderPlayBtn();
}
function clockTick(now){
  if(!playing) return;
  const dt = (now - lastTickWallClock) / 1000;
  lastTickWallClock = now;
  simTime += dt;
  if(simTime >= domainEnd){ simTime = domainEnd; pauseClock(); }
  renderCursor();
  if(playing) requestAnimationFrame(clockTick);
}
function renderPlayBtn(){
  playBtn.textContent = playing ? '⏸' : '▶';
  // visibility, not display: Live still reserves the button's layout slot so
  // the slidertrack (flex:1) doesn't change width -- and therefore doesn't
  // reflow every tick/label position -- when switching modes.
  playBtn.style.visibility = timeMode === 'sim' ? 'visible' : 'hidden';
}
playBtn.onclick = () => { playing ? pauseClock() : startClock(); };

// --- Live / Sim mode ---
const liveBtn = document.getElementById('liveBtn');
const simBtn = document.getElementById('simBtn');
let timeMode = 'live';
let confirmPending = false;
let confirmTimer = null;

function renderTimeMode(){
  liveBtn.classList.toggle('on', timeMode === 'live');
  simBtn.classList.toggle('on', timeMode === 'sim');
  simBtn.classList.toggle('confirm', confirmPending);
  simBtn.textContent = confirmPending ? 'Confirm' : 'Sim';
  slidertrack.style.cursor = timeMode === 'sim' ? 'pointer' : 'default';
  renderPlayBtn();
}

liveBtn.onclick = () => {
  clearTimeout(confirmTimer);
  confirmPending = false;
  timeMode = 'live';
  pauseClock();
  renderTimeMode();
};

simBtn.onclick = () => {
  if(timeMode === 'sim') return;
  if(!confirmPending){
    confirmPending = true;
    renderTimeMode();
    confirmTimer = setTimeout(() => { confirmPending = false; renderTimeMode(); }, 3000);
  } else {
    clearTimeout(confirmTimer);
    confirmPending = false;
    timeMode = 'sim';
    renderTimeMode();
    // Fresh entry into sim always starts here, running -- resuming after a
    // pause/drag continues from wherever it was left instead (see playBtn).
    simTime = T.c2 - 90;
    renderCursor();
    startClock();
  }
};

renderTimebar();
renderTimeMode();
</script>
</body>
</html>
